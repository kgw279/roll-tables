<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roll Table Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1610;
    --parchment: #f5efe0;
    --parchment-dark: #ede4cc;
    --parchment-mid: #f0e8d2;
    --gold: #c8952a;
    --gold-light: #e8b84b;
    --gold-dim: #a07820;
    --crimson: #8b2020;
    --crimson-light: #c13030;
    --emerald: #1a5c3a;
    --emerald-light: #2a7c52;
    --stone: #6b5e4e;
    --stone-light: #8a7a6a;
    --shadow: rgba(26,22,16,0.18);
    --glow: rgba(200,149,42,0.22);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--ink);
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, #2d2518 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(200,149,42,0.03) 49px),
      repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(200,149,42,0.03) 49px);
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, #0f0d09 0%, rgba(15,13,9,0.97) 100%);
    border-bottom: 1px solid rgba(200,149,42,0.3);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    backdrop-filter: blur(8px);
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(200,149,42,0.5);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .header-title span {
    color: var(--gold-light);
  }

  .search-container {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 340px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--stone-light);
    font-size: 13px;
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    padding: 9px 12px 9px 34px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,149,42,0.25);
    border-radius: 6px;
    color: var(--parchment);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #search-input::placeholder { color: var(--stone-light); font-style: italic; }
  #search-input:focus {
    border-color: rgba(200,149,42,0.6);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(200,149,42,0.1);
  }

  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #1c1810;
    border: 1px solid rgba(200,149,42,0.35);
    border-radius: 6px;
    overflow: hidden;
    display: none;
    z-index: 200;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .dropdown.open { display: block; }

  .dd-item {
    padding: 9px 14px;
    font-size: 15px;
    color: var(--parchment-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(200,149,42,0.08);
    transition: background 0.12s;
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.active {
    background: rgba(200,149,42,0.12);
    color: var(--gold-light);
  }
  .dd-item .dd-die {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    padding: 2px 6px;
    border: 1px solid rgba(200,149,42,0.3);
    border-radius: 4px;
    color: var(--gold-dim);
    flex-shrink: 0;
  }

  .clear-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(139,32,32,0.5);
    border-radius: 5px;
    color: var(--crimson-light);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .clear-btn:hover {
    background: rgba(139,32,32,0.15);
    border-color: var(--crimson-light);
    box-shadow: 0 0 12px rgba(139,32,32,0.2);
  }

  /* ── Canvas ── */
  #canvas {
    padding: 36px 24px 80px;
    overflow-x: auto;
    min-height: calc(100vh - 60px);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    opacity: 0.45;
  }
  .empty-state .rune { font-size: 52px; line-height: 1; }
  .empty-state p {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--stone-light);
    text-align: center;
  }

  /* ── Mind-map flow ── */
  #flow {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
  }

  /* SVG connector layer */
  #svg-connectors {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .connector-path {
    fill: none;
    stroke: url(#connGrad);
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    animation: dash-flow 2s linear infinite;
    opacity: 0.55;
  }
  @keyframes dash-flow { to { stroke-dashoffset: -20; } }

  /* ── Table Row ── */
  .table-row-wrap {
    display: flex;
    align-items: flex-start;
    gap: 0;
    position: relative;
    width: 100%;
  }

  /* depth indent */
  .table-row-wrap[data-depth="0"] { padding-left: 0; }
  .table-row-wrap[data-depth="1"] { padding-left: 60px; }
  .table-row-wrap[data-depth="2"] { padding-left: 120px; }
  .table-row-wrap[data-depth="3"] { padding-left: 180px; }
  .table-row-wrap[data-depth="4"] { padding-left: 240px; }

  /* ── Card ── */
  .card {
    background: linear-gradient(160deg, #2a2318 0%, #1e1a12 100%);
    border: 1px solid rgba(200,149,42,0.22);
    border-radius: 10px;
    padding: 18px 20px;
    width: clamp(300px, 420px, 90vw);
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
    margin: 16px 0;
    overflow: visible;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,149,42,0.04) 0%, transparent 60%);
    pointer-events: none;
    border-radius: inherit;
  }
  .card.active-roll {
    border-color: rgba(200,149,42,0.55);
    box-shadow: 0 0 0 1px rgba(200,149,42,0.12), 0 8px 32px rgba(0,0,0,0.4), 0 0 24px rgba(200,149,42,0.08);
  }
  .card.done {
    border-color: rgba(200,149,42,0.12);
    opacity: 0.75;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .card-depth-badge {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(200,149,42,0.1);
    border: 1px solid rgba(200,149,42,0.2);
    border-radius: 3px;
    color: var(--gold-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Die Entries Table ── */
  .die-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 14px;
    font-size: 15px;
  }
  .die-table tr {
    border-bottom: 1px solid rgba(200,149,42,0.08);
    transition: background 0.15s;
  }
  .die-table tr:last-child { border-bottom: none; }
  .die-table td {
    padding: 5px 6px;
    vertical-align: top;
    line-height: 1.45;
  }
  .die-table td.roll-idx {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--stone-light);
    width: 28px;
    padding-top: 7px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .die-table td.roll-flavor {
    color: rgba(240,232,210,0.8);
    font-style: italic;
  }

  /* Highlighted (rolled) row */
  .die-table tr.rolled {
    background: rgba(200,149,42,0.1);
    border-radius: 4px;
  }
  .die-table tr.rolled td.roll-idx {
    color: var(--gold);
    font-weight: 600;
  }
  .die-table tr.rolled td.roll-flavor {
    color: var(--parchment);
    font-style: normal;
    font-weight: 400;
  }

  /* ── Roll button ── */
  .roll-btn {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 9px 20px;
    background: linear-gradient(135deg, rgba(200,149,42,0.18) 0%, rgba(160,120,32,0.1) 100%);
    border: 1px solid rgba(200,149,42,0.45);
    border-radius: 5px;
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
    text-transform: uppercase;
  }
  .roll-btn:hover {
    background: linear-gradient(135deg, rgba(200,149,42,0.3) 0%, rgba(160,120,32,0.2) 100%);
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(200,149,42,0.18);
    transform: translateY(-1px);
  }
  .roll-btn:active { transform: translateY(0) scale(0.98); }
  .roll-btn .die-icon { font-size: 16px; }

  .rolled-result {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 7px 10px;
    background: rgba(200,149,42,0.08);
    border-radius: 5px;
    border: 1px solid rgba(200,149,42,0.18);
  }
  .rolled-result .result-num {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
    min-width: 28px;
    text-align: center;
  }
  .rolled-result .result-label {
    font-size: 13px;
    color: var(--stone-light);
    line-height: 1.3;
  }
  .rolled-result .result-label strong {
    display: block;
    color: var(--parchment);
    font-size: 15px;
    font-style: italic;
    font-weight: 400;
  }

  /* ── Die roll animation ── */
  @keyframes die-shake {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-8deg) scale(1.15); }
    40%  { transform: rotate(10deg) scale(1.1); }
    60%  { transform: rotate(-6deg) scale(1.12); }
    80%  { transform: rotate(5deg) scale(1.08); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .die-rolling { animation: die-shake 0.45s ease; }

  /* ── Card entrance ── */
  @keyframes card-in {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-animate { animation: card-in 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }

  /* ── Connector node dot ── */
  .node-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--ink);
    box-shadow: 0 0 6px rgba(200,149,42,0.5);
    flex-shrink: 0;
    margin-top: 38px;
  }

  /* ── Next table hint ── */
  .next-hint {
    font-size: 13px;
    color: var(--stone-light);
    font-style: italic;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(200,149,42,0.1);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .next-hint .arrow { color: var(--gold-dim); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(200,149,42,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(200,149,42,0.45); }

  /* ── Restart-this-table button ── */
  .restart-btn {
    background: transparent;
    border: 1px solid rgba(200,149,42,0.2);
    border-radius: 5px;
    color: var(--gold-dim);
    cursor: pointer;
    padding: 4px 7px;
    font-size: 14px;
    line-height: 1;
    transition: all 0.18s;
    position: relative;
    flex-shrink: 0;
  }
  .restart-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(200,149,42,0.1);
  }

  .restart-tooltip {
    position: fixed;
    background: #0f0d09;
    border: 1px solid rgba(200,149,42,0.35);
    border-radius: 6px;
    padding: 7px 11px;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    color: var(--parchment-dark);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    z-index: 9999;
  }
  .restart-tooltip.visible { opacity: 1; }
  .restart-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    right: 10px;
    border: 5px solid transparent;
    border-top-color: rgba(200,149,42,0.35);
  }

  /* ── Manual roll input area ── */
  .manual-roll-area {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .manual-roll-label {
    font-size: 13px;
    color: var(--stone-light);
    font-style: italic;
    white-space: nowrap;
  }
  .manual-roll-input {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    width: 62px;
    padding: 5px 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,149,42,0.25);
    border-radius: 5px;
    color: var(--gold-light);
    outline: none;
    text-align: center;
    transition: border-color 0.18s;
  }
  .manual-roll-input:focus { border-color: rgba(200,149,42,0.6); }
  .manual-roll-input::-webkit-inner-spin-button,
  .manual-roll-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .manual-submit-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid rgba(200,149,42,0.3);
    border-radius: 5px;
    color: var(--gold-dim);
    cursor: pointer;
    transition: all 0.16s;
    white-space: nowrap;
  }
  /* ── Dice Roller Widget ── */
  .dice-roller {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,149,42,0.2);
    border-radius: 7px;
    flex-shrink: 0;
    flex-wrap: wrap;
    row-gap: 6px;
  }
  .dice-roller select,
  .dice-roller input[type="number"] {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,149,42,0.25);
    border-radius: 4px;
    color: var(--gold-light);
    outline: none;
    padding: 4px 6px;
    cursor: pointer;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .dice-roller select { width: 72px; text-align: center; }
  .dice-roller input[type="number"] {
    width: 46px;
    text-align: center;
    -moz-appearance: textfield;
  }
  .dice-roller input[type="number"]::-webkit-inner-spin-button,
  .dice-roller input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .dice-roller select:focus,
  .dice-roller input[type="number"]:focus { border-color: rgba(200,149,42,0.6); }

  .dice-roller-x {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--stone-light);
  }

  .dr-roll-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.07em;
    padding: 5px 12px;
    background: linear-gradient(135deg, rgba(200,149,42,0.2) 0%, rgba(160,120,32,0.1) 100%);
    border: 1px solid rgba(200,149,42,0.4);
    border-radius: 4px;
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .dr-roll-btn:hover {
    background: linear-gradient(135deg, rgba(200,149,42,0.32) 0%, rgba(160,120,32,0.2) 100%);
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(200,149,42,0.15);
  }
  .dr-roll-btn:active { transform: scale(0.97); }

  .dr-sep {
    width: 1px;
    height: 20px;
    background: rgba(200,149,42,0.18);
    flex-shrink: 0;
  }

  .dr-results {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .dr-die-pip {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--parchment-dark);
    background: rgba(200,149,42,0.1);
    border: 1px solid rgba(200,149,42,0.22);
    border-radius: 4px;
    padding: 2px 7px;
    line-height: 1.4;
    animation: pip-in 0.25s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes pip-in {
    from { opacity: 0; transform: scale(0.7) translateY(-4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .dr-sum {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    padding-left: 2px;
    white-space: nowrap;
  }
  .dr-results-empty {
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    color: var(--stone-light);
    font-style: italic;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">&#9670; Roll Table <span>Explorer</span></div>

  <div class="search-container">
    <span class="search-icon">&#9654;</span>
    <input type="text" id="search-input" placeholder="Search tables…" autocomplete="off" spellcheck="false"/>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <button class="clear-btn" onclick="clearAll()">&#10005; Clear Tables</button>

  <!-- Standalone dice roller -->
  <div class="dice-roller" id="dice-roller">
    <input type="number" id="dr-count" value="1" min="1" max="20" title="Number of dice"/>
    <span class="dice-roller-x">×</span>
    <select id="dr-type">
      <option>d2</option>
      <option>d3</option>
      <option>d4</option>
      <option selected>d6</option>
      <option>d8</option>
      <option>d10</option>
      <option>d12</option>
      <option>d20</option>
      <option>d100</option>
    </select>
    <button class="dr-roll-btn" onclick="diceRollerRoll()">Roll</button>
    <div class="dr-sep"></div>
    <div class="dr-results" id="dr-results">
      <span class="dr-results-empty">—</span>
    </div>
  </div>
</header>

<!-- Main canvas -->
<div id="canvas">
  <div class="empty-state" id="empty-state">
    <div class="rune">&#9670;</div>
    <p>Search for a table above to begin your fate</p>
  </div>

  <div id="flow" style="display:none;">
    <svg id="svg-connectors" aria-hidden="true">
      <defs>
        <linearGradient id="connGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#c8952a" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#c8952a" stop-opacity="0.2"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
</div>

<script>
/* ──────────────────────────────────────────────
   DATA
────────────────────────────────────────────── */
const TABLES = {
  "Weather": {
    rollType: "1d6",
    entries: [
      { roll: 1, flavor: "Bright sunshine, clear skies — perfect travelling weather" },
      { roll: 2, flavor: "Gentle breeze, partly cloudy overhead" },
      { roll: 3, flavor: "Overcast and grey, the air feels heavy" },
      { roll: 4, flavor: "Light rain begins to fall, the road grows muddy" },
      { roll: 5, flavor: "Heavy downpour, visibility drops to a few feet" },
      { roll: 6, flavor: "Violent storm, lightning strikes dangerously close" },
    ],
    next: { 4: "Minor Encounters", 5: "Storm Events", 6: "Storm Events" }
  },
  "Storm Events": {
    rollType: "1d6",
    entries: [
      { roll: 1, flavor: "A great tree crashes across the road ahead" },

/* ──────────────────────────────────────────────
   STATE
────────────────────────────────────────────── */
let tableChain = []; // [{tableName, cardEl, result, depth}]

/* ──────────────────────────────────────────────
   SEARCH / DROPDOWN
────────────────────────────────────────────── */
const searchInput = document.getElementById('search-input');
const dropdown    = document.getElementById('dropdown');
const tableNames  = Object.keys(TABLES);
let ddActiveIdx   = -1;
let ddFiltered    = [];

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  ddFiltered = q ? tableNames.filter(n => n.toLowerCase().includes(q)) : tableNames;
  renderDropdown();
});

searchInput.addEventListener('focus', () => {
  const q = searchInput.value.trim().toLowerCase();
  ddFiltered = q ? tableNames.filter(n => n.toLowerCase().includes(q)) : tableNames;
  renderDropdown();
});

searchInput.addEventListener('keydown', e => {
  if (!dropdown.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { ddActiveIdx = Math.min(ddActiveIdx+1, ddFiltered.length-1); updateDDActive(); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { ddActiveIdx = Math.max(ddActiveIdx-1, 0); updateDDActive(); e.preventDefault(); }
  else if (e.key === 'Enter') { if (ddActiveIdx >= 0) selectTable(ddFiltered[ddActiveIdx]); e.preventDefault(); }
  else if (e.key === 'Escape') { closeDropdown(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-container')) closeDropdown();
});

function renderDropdown() {
  ddActiveIdx = -1;
  if (!ddFiltered.length) { closeDropdown(); return; }
  dropdown.innerHTML = ddFiltered.map((name, i) => {
    const t = TABLES[name];
    return `<div class="dd-item" data-i="${i}" onclick="selectTable('${name.replace(/'/g,"\\'")}')">
      <span class="dd-die">${t.rollType}</span>
      <span>${name}</span>
    </div>`;
  }).join('');
  dropdown.classList.add('open');
}

function updateDDActive() {
  dropdown.querySelectorAll('.dd-item').forEach((el, i) => {
    el.classList.toggle('active', i === ddActiveIdx);
    if (i === ddActiveIdx) el.scrollIntoView({ block: 'nearest' });
  });
}

function closeDropdown() {
  dropdown.classList.remove('open');
  ddActiveIdx = -1;
}

/* ──────────────────────────────────────────────
   SELECT TABLE (first card)
────────────────────────────────────────────── */
function selectTable(name) {
  closeDropdown();
  searchInput.value = '';

  // Clear existing
  clearAll(false);

  // Show flow
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('flow').style.display = 'block';

  addCard(name, 0);
}

/* ──────────────────────────────────────────────
   ADD CARD
────────────────────────────────────────────── */
function addCard(tableName, depth) {
  const table = TABLES[tableName];
  if (!table) return;

  const flow = document.getElementById('flow');

  const rowWrap = document.createElement('div');
  rowWrap.className = 'table-row-wrap';
  rowWrap.setAttribute('data-depth', Math.min(depth, 4));

  // Node dot for depth > 0
  if (depth > 0) {
    const dot = document.createElement('div');
    dot.className = 'node-dot';
    rowWrap.appendChild(dot);
  }

  const card = document.createElement('div');
  card.className = 'card active-roll card-animate';
  card.setAttribute('data-table', tableName);
  card.setAttribute('data-depth', depth);

  const dieIcon = getDieIcon(table.rollType);

  card.innerHTML = `
    <div class="card-header">
      <div class="card-name">${tableName}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <div class="card-depth-badge">${table.rollType}</div>
        <button class="restart-btn" onclick="restartFromCard(this)" aria-label="Restart from this table">
          &#x21BA;
          <span class="restart-tooltip">Clear all tables and restart fresh<br>using <em>${tableName}</em> as the starting table.</span>
        </button>
      </div>
    </div>
    <table class="die-table" id="dt-${depth}-${Date.now()}">
      <tbody>
        ${table.entries.map(e => `
          <tr data-roll="${e.roll}">
            <td class="roll-idx">${e.roll}</td>
            <td class="roll-flavor">${e.flavor}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div class="result-area"></div>
    <button class="roll-btn" onclick="doRoll(this)">
      <span class="die-icon">${dieIcon}</span> Roll ${table.rollType}
    </button>
    <div class="manual-roll-area">
      <span class="manual-roll-label">or enter your roll:</span>
      <input class="manual-roll-input" type="number" min="${table.entries[0].roll}" max="${table.entries[table.entries.length-1].roll}" placeholder="–" />
      <button class="manual-submit-btn" onclick="doManualRoll(this)">Apply</button>
    </div>
  `;

  card._tableName = tableName;
  card._depth     = depth;
  card._table     = table;

  rowWrap.appendChild(card);
  flow.appendChild(rowWrap);

  // Wire Enter key on manual input
  const manualInput = card.querySelector('.manual-roll-input');
  manualInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') card.querySelector('.manual-submit-btn').click();
  });

  tableChain.push({ tableName, cardEl: card, result: null, depth });

  // Draw connector from previous card
  if (tableChain.length > 1) {
    setTimeout(() => drawConnector(tableChain.length - 2, tableChain.length - 1), 80);
  }

  // Scroll into view
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 120);
}

/* ──────────────────────────────────────────────
   ROLL LOGIC
────────────────────────────────────────────── */
function doRoll(btn) {
  const card = btn.closest('.card');
  const table = card._table;

  // Animate die icon
  const icon = btn.querySelector('.die-icon');
  icon.classList.remove('die-rolling');
  void icon.offsetWidth;
  icon.classList.add('die-rolling');

  const rollVal = simulateRoll(table.rollType);
  resolveRoll(card, rollVal);
}

function doManualRoll(btn) {
  const card = btn.closest('.card');
  const table = card._table;
  const input = card.querySelector('.manual-roll-input');
  const raw = parseInt(input.value, 10);

  const minRoll = table.entries[0].roll;
  const maxRoll = table.entries[table.entries.length - 1].roll;

  if (isNaN(raw) || raw < minRoll || raw > maxRoll) {
    input.style.borderColor = 'rgba(193,48,48,0.7)';
    input.focus();
    setTimeout(() => { input.style.borderColor = ''; }, 1200);
    return;
  }

  resolveRoll(card, raw);
}

function resolveRoll(card, rollVal) {
  const table = card._table;
  const depth = card._depth;

  const entry = table.entries.find(e => e.roll === rollVal)
             || table.entries[table.entries.length - 1];

  // Highlight row
  card.querySelectorAll('.die-table tr').forEach(r => r.classList.remove('rolled'));
  const targetRow = card.querySelector(`.die-table tr[data-roll="${entry.roll}"]`);
  if (targetRow) {
    targetRow.classList.add('rolled');
    targetRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Show result summary
  const resultArea = card.querySelector('.result-area');
  resultArea.innerHTML = `
    <div class="rolled-result">
      <span class="result-num">${rollVal}</span>
      <span class="result-label">
        You rolled<strong>${entry.flavor}</strong>
      </span>
    </div>
  `;

  // Disable both roll controls
  const rollBtn = card.querySelector('.roll-btn');
  rollBtn.disabled = true;
  rollBtn.style.opacity = '0.4';
  rollBtn.style.cursor = 'not-allowed';

  const manualArea = card.querySelector('.manual-roll-area');
  if (manualArea) {
    manualArea.querySelectorAll('input,button').forEach(el => {
      el.disabled = true;
      el.style.opacity = '0.4';
      el.style.cursor = 'not-allowed';
    });
  }

  // Mark card done
  card.classList.remove('active-roll');
  card.classList.add('done');

  // Determine next table
  const nextName = table.next?.[rollVal];
  if (nextName && TABLES[nextName]) {
    const hint = document.createElement('div');
    hint.className = 'next-hint';
    hint.innerHTML = `<span class="arrow">&#8594;</span> Chains to: <strong style="color:var(--gold-dim)">${nextName}</strong>`;
    card.appendChild(hint);

    const chainItem = tableChain.find(c => c.cardEl === card);
    if (chainItem) chainItem.result = rollVal;

    setTimeout(() => addCard(nextName, depth + 1), 380);
  } else {
    const chainItem = tableChain.find(c => c.cardEl === card);
    if (chainItem) chainItem.result = rollVal;

    const endHint = document.createElement('div');
    endHint.className = 'next-hint';
    endHint.innerHTML = `<span style="color:var(--emerald-light)">&#10003;</span> End of chain — press Clear to reset`;
    card.appendChild(endHint);
  }
}

function restartFromCard(btn) {
  const card = btn.closest('.card');
  const tableName = card._tableName;
  clearAll(false);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('flow').style.display = 'block';
  addCard(tableName, 0);
}

function simulateRoll(rollType) {
  const m = rollType.match(/^(\d+)d(\d+)$/i);
  if (!m) return 1;
  const numDice = parseInt(m[1]);
  const sides   = parseInt(m[2]);
  let total = 0;
  for (let i = 0; i < numDice; i++) {
    total += Math.floor(Math.random() * sides) + 1;
  }
  return total;
}

function getDieIcon(rollType) {
  if (rollType.includes('d20')) return '⬡';
  if (rollType.includes('d12')) return '⬠';
  if (rollType.includes('d10')) return '⬟';
  if (rollType.includes('d8'))  return '◇';
  if (rollType.includes('d6'))  return '⬡';
  if (rollType.includes('d4'))  return '△';
  return '◈';
}

/* ──────────────────────────────────────────────
   SVG CONNECTORS
────────────────────────────────────────────── */
function drawConnector(fromIdx, toIdx) {
  const fromCard = tableChain[fromIdx]?.cardEl;
  const toCard   = tableChain[toIdx]?.cardEl;
  if (!fromCard || !toCard) return;

  const svg     = document.getElementById('svg-connectors');
  const flow    = document.getElementById('flow');
  const flowRect = flow.getBoundingClientRect();

  const fromRect = fromCard.getBoundingClientRect();
  const toRect   = toCard.getBoundingClientRect();

  const sx = fromRect.left - flowRect.left + fromRect.width * 0.5;
  const sy = fromRect.bottom - flowRect.top;
  const ex = toRect.left - flowRect.left + toRect.width * 0.5;
  const ey = toRect.top - flowRect.top;

  const mx1 = sx;
  const my1 = sy + (ey - sy) * 0.4;
  const mx2 = ex;
  const my2 = sy + (ey - sy) * 0.6;

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M ${sx} ${sy} C ${mx1} ${my1}, ${mx2} ${my2}, ${ex} ${ey}`);
  path.classList.add('connector-path');
  svg.appendChild(path);

  // Update SVG size
  const totalH = flow.scrollHeight;
  svg.setAttribute('height', totalH);
}

/* ──────────────────────────────────────────────
   CLEAR
────────────────────────────────────────────── */
function clearAll(showEmpty = true) {
  const flow = document.getElementById('flow');

  // Remove all cards/rows except the SVG
  const rows = flow.querySelectorAll('.table-row-wrap');
  rows.forEach(r => r.remove());

  // Clear connectors
  const svg = document.getElementById('svg-connectors');
  while (svg.lastChild && svg.lastChild.tagName !== 'defs') {
    svg.removeChild(svg.lastChild);
  }
  // Clear all paths
  svg.querySelectorAll('path.connector-path').forEach(p => p.remove());

  tableChain = [];

  if (showEmpty) {
    document.getElementById('empty-state').style.display = '';
    document.getElementById('flow').style.display = 'none';
  }
}

/* ──────────────────────────────────────────────
   DICE ROLLER WIDGET
────────────────────────────────────────────── */
function diceRollerRoll() {
  const count  = Math.max(1, Math.min(20, parseInt(document.getElementById('dr-count').value) || 1));
  const dType  = document.getElementById('dr-type').value; // e.g. "d6"
  const sides  = parseInt(dType.slice(1));
  const rolls  = [];
  for (let i = 0; i < count; i++) {
    rolls.push(Math.floor(Math.random() * sides) + 1);
  }
  const sum = rolls.reduce((a, b) => a + b, 0);
  const el  = document.getElementById('dr-results');

  const pips = rolls.map((r, i) =>
    `<span class="dr-die-pip" style="animation-delay:${i * 40}ms">${r}</span>`
  ).join('');

  const sumLabel = count > 1 ? `<span class="dr-sum">= ${sum}</span>` : '';
  el.innerHTML = pips + sumLabel;
}

// Also allow Enter on the count input
document.getElementById('dr-count').addEventListener('keydown', e => {
  if (e.key === 'Enter') diceRollerRoll();
});

/* ──────────────────────────────────────────────
   TOOLTIP POSITIONING (fixed, escapes overflow)
────────────────────────────────────────────── */
document.addEventListener('mouseover', e => {
  const btn = e.target.closest('.restart-btn');
  if (!btn) return;
  const tip = btn.querySelector('.restart-tooltip');
  if (!tip) return;
  const rect = btn.getBoundingClientRect();
  const tipW = tip.offsetWidth || 240;
  let left = rect.right - tipW;
  if (left < 8) left = 8;
  tip.style.left = left + 'px';
  // Show first (so offsetHeight is real), then position
  tip.classList.add('visible');
  const tipH = tip.offsetHeight || 46;
  tip.style.top = (rect.top - tipH - 10) + 'px';
});

document.addEventListener('mouseout', e => {
  const btn = e.target.closest('.restart-btn');
  if (!btn) return;
  const tip = btn.querySelector('.restart-tooltip');
  if (tip) tip.classList.remove('visible');
});
</script>
